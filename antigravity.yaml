# antigravity.yaml — Google Cloud Run service configuration
# Deploy with: gcloud run services replace antigravity.yaml
#
# Reference: https://cloud.google.com/run/docs/reference/rest/v2/projects.locations.services

apiVersion: serving.knative.dev/v1
kind: Service

metadata:
  name: stock-dashboard
  annotations:
    run.googleapis.com/ingress: all        # Allow public traffic

spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"   # Scale to zero for free tier
        autoscaling.knative.dev/maxScale: "3"   # Max 3 for cost control
        run.googleapis.com/execution-environment: gen2

      containerConcurrency: 80
      timeoutSeconds: 300
      containers:
        - image: IMAGE_URL_PLACEHOLDER

          ports:
            - containerPort: 8080

          resources:
            limits:
              cpu:    "1"
              memory: 512Mi

          # ── Environment variables ──────────────────────────────────────────
          envFrom:
            - secretRef:
                name: gainer-loser-secrets
          
          # Health check — Cloud Run will wait for /api/health before routing
          livenessProbe:
            httpGet:
              path: /api/health
            initialDelaySeconds: 15
            periodSeconds: 30

          readinessProbe:
            httpGet:
              path: /api/health
            initialDelaySeconds: 10
            periodSeconds: 10
